<!DOCTYPE html>
<html>
    <head>
        <title>
            Hong Kong Cuisine
        </title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">
</script>
    </head>
    <body style="text-align: center;">
        <div class="jumbotron jumbotron-fluid">
            <div class="container">
                <h1 style="color: rgb(88, 0, 0); font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;">
                    Hong Kong Cuisine
                </h1>
                <h3 style="color:rgb(255, 160, 77); font-family:Georgia, 'Times New Roman', Times, serif; font-style: italic;">
                    Where East Meets West
              </h3>
            </div>
        </div>
        <div class="container mt-3">
            <button type="button" class="btn btn-primary">
                Egg Waffle
            </button>
            <button type="button" class="btn btn-success">
                Dim Sum
            </button>
            <button type="button" class="btn btn-dark">
                Egg Tarts
            </button>
            <button type="button" class="btn btn-light">
                Pineapple Bun (Bo Lo Bao)
            </button>
            <button type="button" class="btn btn-danger">
                Hong Kong-style Milk Tea
            </button>
            <button type="button" class="btn btn-warning">

            </button>
