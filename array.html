<!DOCTYPE html>
<html>
    <head>
        <title>
            Array
        </title>
    </head>
    <body>
        <script>
            var array=[1,2,3,4,5];
            document.write(array[2]+"<br>");
            for(var i=0; i<array.length; i++)
            {
                document.write(array[i]+"<br>");
            }
        </script>
    </body>
</html>
