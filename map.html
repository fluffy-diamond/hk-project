<!DOCTYPE html>
<html>
    <head>
        <title>
            Map
        </title>
    </head>
    <body>
        <script>
            var num=[1,2,3,4,5];
            function myFunction(num) {
                return num*10;
            }
            var newarray=num.map(myFunction);
            document.write(newarray);
        </script>
    </body>
</html>
