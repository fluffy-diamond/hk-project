<!DOCTYPE html>
<html>
    <head>
        <title>
            Arguements
        </title>
    </head>
    <body>
        <script>
            function findMax(){
                var i=0;
                var max=0;
                for(i=0;i<arguments.length;i++){
                    if(arguments[i]>max){
                    max=arguments[i];
                }
                }
                return max;
            }
            document.write (findMax(1,2,3)) ;
        </script>
    </body>
</html>
