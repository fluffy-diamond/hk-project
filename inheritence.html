<!DOCTYPE html>
<html>
    <head>
        <title>
            Inheritency
        </title>
    </head>
    <body>
        <script>
            class car{
                constructor(brand){
                    this.carname=brand;
                }
                present(){
                    return "This car model is "+this.carname;
                }
            }
            class model extends car{
                constructor(brand,mod){
                    super(brand);
                    this.model=mod;
                }
                show() {
                    return this.present()+" and it is a "+this.model;
                }
            }
            let mycar=new model("BMW","123");
            document.write(mycar.show())
        </script>
    </body>
</html>
