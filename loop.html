<!DOCTYPE html>
<html>
    <head>
        <title>
            Loop
        </title>
    </head>
    <body>
        <p>Loop</p>
        <script>
            var fruits=["apple","mango","banana","watermelon","melon","blueberries","strawberries"]
            var i=0
            for(i=0;i<fruits.length;i++)
        {
            document.write(fruits[i]+"<br>");
        }
        </script>
    </body>
</html>
