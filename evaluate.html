<!DOCTYPE html>
<html>
    <head>
        <title>
            Evaluate
        </title>
    </head>
    <body>
        <script>
            var a=10;
            var b=100;
            var x=eval("a+b")+"<br>";
            var y=eval("2*1")+"<br>";
            var z=eval("a*b")+"<br>";
            document.write(x+y+z);
        </script>
    </body>
</html>
