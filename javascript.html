<!DOCTYPE html>
<html>
    <head>
        <title>
            Javascript
        </title>
    </head>
    <body>
        <p>The sum of 2 numbers</p>
        <p id="result"></p>
        <script>
            var no1=5;
            var no2=4;
            var sum=no1 + no2;
            document.getElementById("result").innerHTML= "The sum of " + no1 + " and " + no2 + " is " + sum;
        </script>
    </body>
</html>
