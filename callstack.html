<!DOCTYPE html>
<html>
    <head>
        <title>
            Call Stack
        </title>
    </head>
    <body>
        <script>
            function add(a,b){
                return a+b;
            }
            function average(a,b){
                return add(a,b)/2;
            }
            let result=average(2,4);
            document.write("The average is " + result);
        </script>
    </body>
</html>
