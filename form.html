<!DOCTYPE html>
<html>
    <head>
        <title>
            Form
        </title>
    </head>
    <body>
        <h1>Form</h1>
        <div class="box">
            <form id="loginForm">
                <div class="row">
                    <label>Name:</label>
                    <input type="text" id="name" placeholder="Heer">
                </div>

                <div class="row">
                    <label>Email ID:</label>
                    <input type="email" id="email" placeholder="abc@gmail.com">
                </div>

                <div class="row">
                    <label>Password:</label>
                    <input type="password" id="password" placeholder="1234567">
                </div>
                <button>Login</button>
            </form>
        </div>
        <p id="messagebox"></p>
        <script src="myjavascript.js"></script>
    </body>
</html>
